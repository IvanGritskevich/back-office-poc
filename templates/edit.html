<!DOCTYPE html>
<html>
<head>
    <title>Редактирование Инвойса</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 4px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 20px; cursor: pointer; font-size: 16px; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 10px;}
        button:hover { background-color: #27ae60; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h2>✏️ Проверка и исправление данных инвойса</h2>
    <form method="post">
        <h3>👤 Данные клиента</h3>
        <div class="field">
            <label>Имя клиента / Компания (name):</label>
            <input type="text" name="name" value="{{ data.name or '' }}">
        </div>
        <div class="field">
            <label>Email клиента (email):</label>
            <input type="text" name="client_email" value="{{ data.email or '' }}">
        </div>
        <div class="field">
            <label>Улица, дом (address):</label>
            <input type="text" name="address" value="{{ data.address or '' }}">
        </div>
        <div class="field">
            <label>Город (city):</label>
            <input type="text" name="city" value="{{ data.city or '' }}">
        </div>
        <div class="field">
            <label>Страна (country):</label>
            <input type="text" name="country" value="{{ data.country or '' }}">
        </div>
        <div class="field">
            <label>Почтовый индекс (postal):</label>
            <input type="text" name="postal" value="{{ data.postal or '' }}">
        </div>

        <h3>💰 Параметры счета</h3>
        <div class="field">
            <label>Сумма счета (amount):</label>
            <input type="number" step="0.01" name="amount" value="{{ data.amount or 0.0 }}">
        </div>
        <div class="field">
            <label>Валюта (currency):</label>
            <input type="text" name="currency" value="{{ data.currency or 'USD' }}">
        </div>

        <button type="submit">💾 Подтвердить и выгрузить в боевую БД</button>
    </form>
</body>
</html>
